# =============================================================================
# batocera.conf — ROM link configuration for Batocera Linux
# =============================================================================
# os_name       : Label used in logs
# canonical_root: Absolute path to your master ROM collection on TrueNAS
# target_root   : Absolute path to the symlink tree this config will build
# =============================================================================

os_name        = Batocera
canonical_root = /mnt/Jupiter/roms_collection/Master
target_root    = /mnt/Jupiter/roms_collection/Views/batocera-roms

# =============================================================================
# [systems]
# Format:  dest_folder = source/relative/path : mode
#
# dest_folder  : folder name Batocera expects under its roms root
# source path  : path relative to canonical_root above
# mode         :
#   flat       — link files at top level only (cartridge-based, single-file games)
#   recursive  — mirror full subdir tree with file links (disc-based, multi-file games)
#   dir        — single directory-level symlink (use for MAME/arcade, self-managed sets)
# =============================================================================

[systems]

# Nintendo
#nes             = nintendo/nes        : flat
#snes            = nintendo/snes       : flat
#n64             = nintendo/n64        : flat
gba             = Nintendo/Nintendo - Game Boy Advance : flat
gbc             = Nintendo/Nintendo - Game Boy Color   : flat
gb              = Nintendo/Nintendo - Game Boy         : flat
#nds             = nintendo/nds        : flat
#gamecube        = nintendo/gamecube   : recursive
#wii             = nintendo/wii        : recursive

# Sega
#mastersystem    = sega/mastersystem   : flat
#megadrive       = sega/genesis        : flat
#gamegear        = sega/gamegear       : flat
#saturn          = sega/saturn         : recursive
#dreamcast       = sega/dreamcast      : recursive

# Sony
#psx             = sony/psx            : recursive
#ps2             = sony/ps2            : recursive
#psp             = sony/psp            : recursive

# Arcade
#mame            = arcade/mame         : dir
#neogeo          = arcade/neogeo       : dir
#fbneo           = arcade/fbneo        : dir

# Atari
#atari2600       = atari/2600          : flat
#atari7800       = atari/7800          : flat
#atarilynx       = atari/lynx          : flat
