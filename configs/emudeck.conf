# =============================================================================
# emudeck.conf — ROM link configuration for EmuDeck (Steam Deck / Linux)
# =============================================================================
# EmuDeck expects ROMs under ~/Emulation/roms/ with its own system folder names.
# Adjust target_root to wherever your EmuDeck NFS mount point is.
# =============================================================================

os_name        = EmuDeck
canonical_root = /mnt/Jupiter/roms_collection/Master
target_root    = /mnt/Jupiter/roms_collection/Views/emudeck-roms

# =============================================================================
# [systems]
# Format:  dest_folder = source/relative/path : mode
# =============================================================================

[systems]

# Nintendo
nes             = nintendo/nes        : flat
snes            = nintendo/snes       : flat
n64             = nintendo/n64        : flat
gba             = nintendo/gba        : flat
gbc             = nintendo/gbc        : flat
gb              = nintendo/gb         : flat
nds             = nintendo/nds        : flat
gamecube        = nintendo/gamecube   : recursive
wii             = nintendo/wii        : recursive
wiiu            = nintendo/wiiu       : recursive
switch          = nintendo/switch     : recursive

# Sega
genesis         = sega/genesis        : flat
gamegear        = sega/gamegear       : flat
saturn          = sega/saturn         : recursive
dreamcast       = sega/dreamcast      : recursive

# Sony — EmuDeck uses "ps1" not "psx"
ps1             = sony/psx            : recursive
ps2             = sony/ps2            : recursive
psp             = sony/psp            : recursive

# Arcade
mame            = arcade/mame         : dir
neogeo          = arcade/neogeo       : dir

# Atari
atari2600       = atari/2600          : flat
atari7800       = atari/7800          : flat
lynx            = atari/lynx          : flat

# Microsoft
xbox            = microsoft/xbox      : recursive
